<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Fusion</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <section id="slideshow">

        <h2>Monitoramento Ambiental por Satélite</h2>

        <div class="slider">

            <img class="slide ativo" src="./img/queimada.webp" alt="Área afetada por queimadas">

            <img class="slide" src="./img/satelite.webp" alt="Satélite monitorando a Terra">

            <img class="slide" src="./img/floresta.webp" alt="Área de preservação ambiental">

            <button id="anterior">❮</button>
            <button id="proximo">❯</button>

        </div>

    </section>

    <section id="analise">

    <h2>Análise Ambiental de Terreno</h2>

    <form id="formAnalise">

        <input type="text" id="endereco" placeholder="Endereço">

        <input type="text" id="estado" placeholder="Estado (SP)" maxlength="2">

        <input type="number" step="0.0001" id="latitude" placeholder="Latitude">

        <input type="number" step="0.0001" id="longitude" placeholder="Longitude">

        <input type="number" step="0.01" id="area" placeholder="Área (ha)">

        <button type="submit">
            Analisar Terreno
        </button>

    </form>

    <div id="resultadoAnalise"></div>

</section>

    <section id="quiz">

        <h2>Quiz Ambiental</h2>

        <div class="progresso">
            <div id="barraProgresso"></div>
        </div>

        <p id="contador"></p>

        <div id="quiz-container"></div>
        <p id="mensagemErro"></p>
        <div class="botoes">
            <button id="btnVoltar">Voltar</button>
            <button id="btnAvancar">Próxima</button>
        </div>

        <div id="resultado"></div>

    </section>
    <script src="./js/script.js"></script>
    <script src="./js/analise.js"></script>
</body>

</html>
